<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística y Eventos - COOSAJO</title>
    <style>
        :root { --azul: #172e59; --verde: #158e45; --blanco: #ffffff; --fondo: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 250px; margin-bottom: 10px; height: auto; }
        h1 { color: var(--azul); margin: 0; font-size: 1.8rem; }
        p { color: #666; margin-top: 5px; }

        .formulario-card { background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        
        .grupo-form { margin-bottom: 20px; }
        label.titulo-seccion { display: block; font-weight: bold; margin-bottom: 8px; color: var(--azul); font-size: 0.95rem; border-bottom: 2px solid #e9ecef; padding-bottom: 5px; }
        
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .radio-card { position: relative; display: block; }
        .radio-card input { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-card span { display: flex; align-items: center; justify-content: center; border: 2px solid #ccc; border-radius: 8px; padding: 12px; cursor: pointer; text-align: center; height: 100%; transition: 0.2s; background: white; font-size: 0.85rem; color: #555; font-weight: 600; }
        .radio-card input:checked + span { background-color: var(--azul); color: white; border-color: var(--azul); }

        .botones-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-guardar { background-color: var(--verde); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-dashboard { background-color: var(--azul); color: white; text-align: center; text-decoration: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
        
        #mensaje-exito { display: none; background-color: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="header">
        <img src="LOGO COOSAJO SIN ESLOGAN.png" alt="COOSAJO" class="logo">
        <h1>Publicidad y Eventos</h1>
        <p>Control de logística y servicios para marcas</p>
    </div>

    <div class="formulario-card">
        <div id="mensaje-exito">✅ ¡Servicio registrado correctamente!</div>
        <form id="formEventos">
            <div class="grupo-form" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label class="titulo-seccion">Mes:</label>
                    <select id="mes" required>
                        <option value="" disabled selected>Mes...</option>
                        <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
                        <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
                        <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
                        <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
                        <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
                        <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label class="titulo-seccion">Marca / Proyecto:</label>
                    <select id="marca" required>
                        <option value="" disabled selected>Marca...</option>
                        <option value="Meta">Meta</option>
                        <option value="Magicuenta">Magicuenta</option>
                        <option value="Coosajo">Coosajo</option>
                        <option value="Municipalidad">Municipalidad</option>
                        <option value="Parque Chatun">Parque Chatun</option>
                    </select>
                </div>
            </div>

            <div class="grupo-form">
                <label class="titulo-seccion">Servicio Prestado:</label>
                <div class="grid-servicios">
                    <label class="radio-card"><input type="radio" name="servicio" value="Unidad Móvil" required><span>Unidad Móvil</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Sonido"><span>Sonido</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Carrileras"><span>Carrileras</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Toldos"><span>Toldos</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Andamios"><span>Andamios</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Logística Carrera"><span>Logística Carrera</span></label>
                    <label class="radio-card"><input type="radio" name="servicio" value="Animación Promotores"><span>Animaciones</span></label>
                </div>
            </div>

            <div class="grupo-form" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label class="titulo-seccion">Cantidad / Días:</label>
                    <input type="number" id="cantidad" min="1" required placeholder="Ej. 1">
                </div>
                <div style="flex: 1;">
                    <label class="titulo-seccion">Valor Estimado (Q):</label>
                    <input type="number" id="valor" required placeholder="Ej. 1500">
                </div>
            </div>

            <div class="grupo-form">
                <label class="titulo-seccion">Observaciones:</label>
                <textarea id="obs" rows="2" placeholder="Detalles del evento..."></textarea>
            </div>

            <div class="botones-container">
                <button type="submit" id="btnGuardar" class="btn-guardar">💾 Guardar Registro</button>
                <a href="dashboard.html" class="btn-dashboard">📊 Ver Dashboard Beta</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('formEventos').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.innerText = "Guardando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "area_eventos"), {
                    mes: document.getElementById('mes').value,
                    marca: document.getElementById('marca').value,
                    servicio: document.querySelector('input[name="servicio"]:checked').value,
                    cantidad: Number(document.getElementById('cantidad').value),
                    total: Number(document.getElementById('valor').value) * Number(document.getElementById('cantidad').value),
                    observaciones: document.getElementById('obs').value,
                    fecha: new Date()
                });
                document.getElementById('mensaje-exito').style.display = 'block';
                document.getElementById('formEventos').reset();
                setTimeout(() => document.getElementById('mensaje-exito').style.display = 'none', 3000);
            } catch (f) { alert("Error al guardar"); }
            finally { btn.innerText = "💾 Guardar Registro"; btn.disabled = false; }
        });
    </script>
</body>
</html>
